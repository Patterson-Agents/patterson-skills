<!-- @dsCard group="Type" viewport="700x250" name="Primary typeface — Proxima Nova" subtitle="Real Patterson font (Adobe Fonts); Figtree is the loaded free fallback" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .big { font-size: 76px; font-weight: var(--fw-bold); color: var(--text-strong); letter-spacing: var(--ls-tight); line-height: 1; }
  .glyphs { font-size: 22px; color: var(--text-body); margin-top: 14px; letter-spacing: 0.01em; }
  .meta { margin-top: 16px; font-size: var(--fs-sm); color: var(--text-muted); display: flex; gap: 18px; flex-wrap: wrap; }
  .meta b { color: var(--text-heading); font-weight: var(--fw-semibold); }
</style>
</head>
<body>
  <div class="big">Proxima&nbsp;Nova</div>
  <div class="glyphs">ABCDEFGHIJKLMNOPQRSTUVWXYZ<br>abcdefghijklmnopqrstuvwxyz 0123456789 &amp; @ $ % # ?</div>
  <div class="meta"><span><b>proxima-nova, Arial, sans-serif</b></span><span>Adobe Fonts</span><span>Fallback: Figtree</span><span><b>var(--font-sans)</b></span></div>
</body>
</html>
