<!-- @dsCard group="Colors" viewport="700x180" name="Primary palette" subtitle="Navy, sky blue, gray & white — the core of the brand" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .chip { height: 84px; }
  .meta { padding: 10px 12px; }
  .name { font-weight: var(--fw-bold); color: var(--text-heading); font-size: var(--fs-sm); }
  .hex { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-muted); margin-top: 2px; }
  .pms { font-size: 10px; color: var(--text-muted); letter-spacing: var(--ls-wide); text-transform: uppercase; margin-top: 1px; }
  .bordered { border: 1px solid var(--border-default); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background: var(--pat-navy)"></div><div class="meta"><div class="name">Navy</div><div class="hex">#003767</div><div class="pms">PMS 540</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--pat-sky)"></div><div class="meta"><div class="name">Sky</div><div class="hex">#00A8E1</div><div class="pms">PMS 2995</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--pat-gray)"></div><div class="meta"><div class="name">Gray</div><div class="hex">#58585B</div><div class="pms">Cool Gray 11</div></div></div>
    <div class="sw bordered"><div class="chip" style="background: var(--pat-white)"></div><div class="meta"><div class="name">White</div><div class="hex">#FFFFFF</div><div class="pms">Background</div></div></div>
  </div>
</body>
</html>
