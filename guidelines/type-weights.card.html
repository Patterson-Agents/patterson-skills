<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); }
  .row { display: flex; flex-wrap: wrap; gap: 10px 26px; }
  .w { display: flex; flex-direction: column; }
  .sample { font-size: 30px; color: var(--text-heading); line-height: 1.1; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="w"><span class="sample" style="font-weight:300">Aa</span><span class="lbl">Light 300</span></div>
    <div class="w"><span class="sample" style="font-weight:400">Aa</span><span class="lbl">Regular 400</span></div>
    <div class="w"><span class="sample" style="font-weight:500">Aa</span><span class="lbl">Medium 500</span></div>
    <div class="w"><span class="sample" style="font-weight:600">Aa</span><span class="lbl">Semibold 600</span></div>
    <div class="w"><span class="sample" style="font-weight:700">Aa</span><span class="lbl">Bold 700</span></div>
    <div class="w"><span class="sample" style="font-weight:800">Aa</span><span class="lbl">Extra 800</span></div>
    <div class="w"><span class="sample" style="font-weight:900">Aa</span><span class="lbl">Black 900</span></div>
  </div>
</body>
</html>
