<!-- @dsCard group="Spacing" viewport="700x190" name="Spacing scale" subtitle="4px base unit — space-1 through space-12" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); }
  .row { display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: var(--pat-sky); border-radius: var(--radius-xs); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .px { font-size: 10px; color: var(--text-heading); font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="width:4px;height:4px"></div><span class="px">4</span><span class="lbl">1</span></div>
    <div class="item"><div class="box" style="width:8px;height:8px"></div><span class="px">8</span><span class="lbl">2</span></div>
    <div class="item"><div class="box" style="width:12px;height:12px"></div><span class="px">12</span><span class="lbl">3</span></div>
    <div class="item"><div class="box" style="width:16px;height:16px"></div><span class="px">16</span><span class="lbl">4</span></div>
    <div class="item"><div class="box" style="width:24px;height:24px"></div><span class="px">24</span><span class="lbl">5</span></div>
    <div class="item"><div class="box" style="width:32px;height:32px"></div><span class="px">32</span><span class="lbl">6</span></div>
    <div class="item"><div class="box" style="width:40px;height:40px"></div><span class="px">40</span><span class="lbl">7</span></div>
    <div class="item"><div class="box" style="width:48px;height:48px"></div><span class="px">48</span><span class="lbl">8</span></div>
    <div class="item"><div class="box" style="width:64px;height:64px"></div><span class="px">64</span><span class="lbl">9</span></div>
    <div class="item"><div class="box" style="width:80px;height:80px"></div><span class="px">80</span><span class="lbl">10</span></div>
  </div>
</body>
</html>
