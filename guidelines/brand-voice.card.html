<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--pat-navy); color: #fff; }
  .eye { font-size: var(--fs-xs); font-weight: var(--fw-bold); letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--pat-sky); }
  .tag { font-size: 30px; font-weight: var(--fw-bold); letter-spacing: var(--ls-snug); margin: 8px 0 14px; line-height: 1.1; }
  .tag em { color: var(--pat-sky); font-style: normal; }
  .values { display: flex; gap: 10px; flex-wrap: wrap; }
  .v { font-size: var(--fs-sm); font-weight: var(--fw-semibold); padding: 6px 14px; border-radius: var(--radius-pill); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18); }
  .since { margin-top: 14px; font-size: var(--fs-sm); color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
  <div class="eye">Our purpose</div>
  <div class="tag">We strengthen the people who keep us<br>and our animals <em>healthy</em>.</div>
  <div class="values">
    <span class="v">Passionate</span>
    <span class="v">Focused</span>
    <span class="v">People-first</span>
    <span class="v">Always advancing</span>
  </div>
  <div class="since">An indispensable partner — not just a distributor. Since 1877.</div>
</body>
</html>
