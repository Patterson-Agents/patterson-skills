          <div key={g.title} style={{marginBottom:'var(--space-6)'}}>
            <div className="subhead" style={{margin:'0 0 4px'}}>{g.title}</div>
            {g.note && <p style={{margin:'0 0 var(--space-3)',color:'var(--text-muted)',fontSize:'var(--fs-sm)'}}>{g.note}</p>}
            <div className="swatch-grid">
              {g.items.map(([nm,vr,hx]) => (
                <div className="swatch" key={vr}>
                  <div className="chip" style={{background:`var(${vr})`, borderBottom: hx==='#FFFFFF'?'var(--border-w) solid var(--border-subtle)':'none'}} />
                  <div className="meta">
                    <div className="nm">{nm}</div>
                    <div className="vr">{vr}</div>
                    <div className="hx">{hx}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </Block>

      {/* ---------- Typography ---------- */}
      <Block id="type" kicker="Foundations" title="Typography"
        lede="Proxima Nova (the real Patterson face, loaded here from the repo; Figtree is the free fallback). Bold, tightly-tracked navy headlines; cool-gray body at 1.6 leading.">
        {TYPE_RAMP.map(([nm,vr,wt,ls,sz,sample]) => (
          <div className="type-row" key={nm}>
            <div className="spec"><b>{nm}</b>{vr}<br/>{sz} · {wt} · ls {ls}</div>
            <div className="type-sample" style={{fontSize:`var(${vr})`, fontWeight:wt, letterSpacing:ls, lineHeight: wt>=600?1.12:1.5}}>{sample}</div>
          </div>
        ))}
        <div className="subhead">Signature devices</div>
        <div className="demo-grid">
          <div>
            <div className="pat-eyebrow" style={{marginBottom:8}}>Eyebrow / overline</div>
            <div style={{fontSize:'var(--fs-sm)',color:'var(--text-muted)'}}>Uppercase, letter-spaced, sky. Sits above headlines.</div>
          </div>
          <div>
            <Stat value="86M" label="U.S. households have pets" tone="sky" />
          </div>
          <div>
            <Stat value="1877" label="Serving practices since" tone="navy" />
          </div>
        </div>
      </Block>

      {/* ---------- Spacing ---------- */}
      <Block id="spacing" kicker="Foundations" title="Spacing"
        lede="A 4px base scale drives padding, gaps and layout rhythm across every component.">
        <div className="spec-list">
          {SPACE.map(([n,vr,px]) => (
            <div className="space-row" key={vr}>
              <div className="lbl">space/{n}</div>
              <div className="px">{px}px</div>
              <div className="bar" style={{width:`var(${vr})`, minWidth: px==='0'?'2px':undefined, opacity: px==='0'?0.3:1}} />
            </div>
          ))}
        </div>
      </Block>

      {/* ---------- Radii ---------- */}
      <Block id="radii" kicker="Foundations" title="Radius"
        lede="Soft corners throughout — 10px on cards, fully-rounded pill buttons.">
        <div className="radii-grid">
          {RADII.map(([n,vr,px]) => (
            <div className="radii-cell" key={vr}>
              <div className="radii-box" style={{borderRadius:`var(${vr})`}} />
              <div className="cap"><b>radius/{n}</b>{px}</div>
            </div>
          ))}
        </div>
      </Block>

      {/* ---------- Shadows ---------- */}
      <Block id="shadows" kicker="Foundations" title="Elevation &amp; focus"
        lede="Cool, low-spread, navy-tinted shadows. A clear sky focus ring signals interactivity.">
        <div className="shadow-grid">
          {SHADOWS.map(([n,vr]) => (
            <div className="shadow-cell" key={vr}>
              <div className="shadow-box" style={{boxShadow:`var(${vr})`}} />
              <div className="cap"><b>shadow/{n}</b>{vr}</div>
            </div>
          ))}
          <div className="shadow-cell">
            <div className="shadow-box" style={{boxShadow:'var(--ring-focus)'}} />
            <div className="cap"><b>ring/focus</b>sky 45%</div>
          </div>
          <div className="shadow-cell">
            <div className="shadow-box" style={{boxShadow:'var(--ring-error)'}} />
            <div className="cap"><b>ring/error</b>red 35%</div>
          </div>
        </div>
      </Block>

      {/* ---------- Components ---------- */}
      <Block id="components" kicker="Library" title="Components"
        lede="All twelve components, rendered live from the compiled library. These are the real components — the same code consuming projects import.">

        {/* Button */}
        <Demo title="Button" desc="Pill-shaped action button. Primary is solid navy → shifts to sky on hover. Five variants × three sizes, plus icon and disabled states.">
          {btnVariants.map(v => (
            <div className="demo-row" key={v}>
              <div className="rowlabel">variant = {v}</div>
              {btnSizes.map(s => <Button key={s} variant={v} size={s}>{s.toUpperCase()}</Button>)}
              <Button variant={v} iconLeft={<I.plus/>}>With icon</Button>
              <Button variant={v} disabled>Disabled</Button>
            </div>
          ))}
          <div className="demo-row ondark">
            <div className="rowlabel">variant = onDark</div>
            {btnSizes.map(s => <Button key={s} variant="onDark" size={s}>{s.toUpperCase()}</Button>)}
            <Button variant="onDark" iconRight={<I.arrow/>}>Learn more</Button>
          </div>
        </Demo>

        {/* IconButton */}
        <Demo title="IconButton" desc="Circular icon-only control (md meets the 44px hit-target minimum). Four variants × three sizes.">
          {ibVariants.map(v => (
            <div className="demo-row" key={v}>
              <div className="rowlabel">variant = {v}</div>
              {btnSizes.map(s => <IconButton key={s} variant={v} size={s} label={`${v} ${s}`}><I.bell/></IconButton>)}
              <IconButton variant={v} label="disabled" disabled><I.heart/></IconButton>
            </div>
          ))}
        </Demo>

        {/* Badge */}
        <Demo title="Badge" desc="Small uppercase status/label chip. Eight tones, soft-tint or solid.">
          <div className="demo-row">
            <div className="rowlabel">soft (default)</div>
            {badgeTones.map(t => <Badge key={t} tone={t}>{t}</Badge>)}
          </div>
          <div className="demo-row">
            <div className="rowlabel">solid</div>
            {badgeTones.map(t => <Badge key={t} tone={t} solid>{t}</Badge>)}
          </div>
        </Demo>

        {/* Stat */}
        <Demo title="Stat" desc="Signature big-number device for proof points. Four tones; left or center aligned.">
          <div className="demo-grid">
            <Card><Stat value="98%" label="Customers reached in 1–2 day shipping" tone="sky" /></Card>
            <Card><Stat value="60" label="Fulfillment centers" tone="navy" /></Card>
            <Card><Stat value="$6.5B" label="Annual net sales" tone="teal" align="center" /></Card>
            <Card><Stat value="1877" label="Trusted since" tone="green" align="center" /></Card>
          </div>
        </Demo>

        {/* Card */}
        <Demo title="Card" desc="White surface with soft navy-tinted shadow and an optional top accent stripe. Five elevations; interactive lift on hover.">
          <div className="demo-grid">
            {['none','xs','sm','md','lg'].map(e => (
              <Card key={e} elevation={e}>
                <div style={{fontWeight:700,color:'var(--pat-navy)'}}>elevation = {e}</div>
                <p style={{margin:'6px 0 0',fontSize:'var(--fs-sm)',color:'var(--text-body)'}}>Soft, low-contrast depth tuned to the brand.</p>
              </Card>
            ))}
            <Card accent="sky" interactive>
              <Badge tone="sky" solid>New</Badge>
              <h4 style={{margin:'10px 0 4px'}}>Accent + interactive</h4>
              <p style={{margin:0,fontSize:'var(--fs-sm)',color:'var(--text-body)'}}>Sky accent stripe; hover to lift.</p>
            </Card>
          </div>
        </Demo>

        {/* Alert */}
        <Demo title="Alert" desc="Inline message banner with a left accent bar in the tone color. Optional title and dismiss.">
          <div style={{display:'flex',flexDirection:'column',gap:'var(--space-3)'}}>
            <Alert tone="info" title="Heads up">Your Advantage Rewards statement is ready to view.</Alert>
            <Alert tone="success" title="Order placed">98% of orders ship within 1–2 business days.</Alert>
            <Alert tone="warning">Three items in your cart are low on stock.</Alert>
            <Alert tone="danger" title="Payment failed" onClose={()=>{}}>We couldn't process your card. Please update billing.</Alert>
            <Alert tone="brand">We are much more than a distributor — we are an indispensable partner.</Alert>
          </div>
        </Demo>

        {/* Tabs */}
        <Demo title="Tabs" desc="Horizontal tab bar with a sky underline on the active tab.">
          <div className="demo-row" style={{background:'var(--surface-card)'}}><TabsDemo DS={DS} /></div>
        </Demo>

        {/* Forms */}
        <Demo title="Forms — Input, Select, Checkbox, Radio, Switch" desc="Labelled controls with the sky focus ring, helper and error states.">
          <div className="demo-grid" style={{gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))'}}>
            <Input label="Practice name" placeholder="e.g. Riverside Dental" helper="As it appears on your account." />
            <Input label="Search products" placeholder="Search…" iconLeft={<I.search/>} />
            <Input label="Email" defaultValue="not-an-email" error="Enter a valid email address." required />
            <Input label="Account ID" defaultValue="Locked field" disabled />
            <Select label="Market" options={[{value:'dental',label:'Dental'},{value:'vet',label:'Veterinary'},{value:'equine',label:'Equine / Production'}]} />
          </div>
          <div className="demo-row" style={{marginTop:'var(--space-4)', background:'var(--surface-card)', gap:'var(--space-6)'}}>
            <div style={{display:'flex',flexDirection:'column',gap:'var(--space-3)'}}>
              <div className="rowlabel">Checkbox</div>
              <Checkbox label="Email me order updates" defaultChecked />
              <Checkbox label="Enroll in Advantage Rewards" />
              <Checkbox label="Disabled option" disabled />
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'var(--space-3)'}}>
              <div className="rowlabel">Switch</div>
              <Switch label="Auto-reorder essentials" defaultChecked />
              <Switch label="Paperless statements" />
              <Switch label="Disabled" disabled />
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'var(--space-3)'}}>
              <div className="rowlabel">Radio — choose a market</div>
              <RadioDemo DS={DS} />
            </div>
          </div>
        </Demo>
      </Block>

      {/* ---------- UI Kits ---------- */}
      <Block id="uikits" kicker="Composed screens" title="UI Kits"
        lede="Full page recreations assembled from the component library — the corporate website and the brand-switchable storefront. Each runs live in its own frame; interact with them (navigate, switch brand, add to cart).">
        <Demo title="Corporate Website" desc="Recreation of pattersoncompanies.com — sticky nav, navy hero, content bands and footer. Use the header nav to move between Home, What We Do and Newsroom.">
          <KitFrame
            title="patterson — corporate site"
            href="./ui_kits/corporate-website/index.html"
            caption={<span><b>Screens:</b> Home · What We Do · Newsroom — built on Button, Card, Stat, Badge, Alert and the tokens.</span>}
            srcdoc={kitDoc('', MOUNT_CORPORATE)}
          />
        </Demo>
        <Demo title="Storefront — Dental &amp; Veterinary" desc="Patterson e-commerce shell (pattern library v5.7.2), brand-switchable. Toggle Dental / Veterinary at the bottom-right; “Add to cart” updates the header count with a toast.">
          <KitFrame
            title="patterson — storefront"
            href="./ui_kits/storefront/index.html"
            caption={<span><b>Brand-switchable:</b> the same shell re-skins for Dental and Veterinary via the storefront brand tokens.</span>}
            srcdoc={kitDoc(STORE_CSS, MOUNT_STORE)}
          />
        </Demo>
      </Block>

      <footer className="ref-foot">
        Patterson Companies — Design System · rendered from <code className="tok">_ds_bundle.js</code> + <code className="tok">styles.css</code> ·
        <span> Trusted Expertise. Unrivaled Support.</span>
      </footer>
    </React.Fragment>
  );
}

boot();
</script>
</body>
</html>
