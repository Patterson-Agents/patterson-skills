<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-subtle); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; background:#fff; border:1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 22px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function mount(){
  const DS = window.PattersonCompaniesDesignSystem_1f7cbe;
  if(!DS) return void setTimeout(mount, 60);
  const { Input, Select, Checkbox, Radio, Switch } = DS;
  const Mail = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>;

  function Demo() {
    const [market, setMarket] = React.useState('Dental');
    return (
      <div className="grid">
        <div className="stack">
          <Input label="Work email" type="email" placeholder="you@practice.com" iconLeft={<Mail/>} required />
          <Input label="Practice name" defaultValue="Cedar Dental" helper="As it appears on your account" />
          <Input label="Account number" error="We couldn't find that account" defaultValue="000-114" />
          <Select label="Market" options={['Dental','Veterinary','Production animal','Equine']} />
        </div>
        <div className="stack">
          <Switch label="Auto-reorder everyday essentials" defaultChecked />
          <Switch label="Pause email notifications" />
          <Checkbox label="Email me Patterson news" defaultChecked />
          <Checkbox label="I agree to the terms of use" />
          <div>
            <div style={{fontSize:'var(--fs-sm)', fontWeight:600, color:'var(--text-heading)', marginBottom:10}}>Primary market</div>
            <Radio.Group name="m" value={market} onChange={setMarket} options={['Dental','Veterinary','Production animal']} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  }
  mount();
</script>
</body>
</html>
