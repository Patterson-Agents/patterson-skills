<!-- @dsCard group="Storefront" viewport="1280x900" name="Storefront — Dental & Vet" subtitle="Patterson e-commerce shell (pattern library v5.7.2), brand-switchable" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patterson Storefront — UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="brands.js"></script>
<style>
  html, body { margin: 0; background: var(--surface-page); }
  .brand-switch { position: fixed; right: 16px; bottom: 16px; z-index: 200; display: flex; gap: 4px; padding: 4px; background: #fff; border: 1px solid var(--border-default); border-radius: var(--radius-pill); box-shadow: var(--shadow-lg); }
  .brand-switch button { appearance: none; border: none; cursor: pointer; padding: 8px 16px; border-radius: var(--radius-pill); font-family: var(--font-sans); font-size: var(--fs-sm); font-weight: 600; background: transparent; color: var(--text-muted); }
  .brand-switch button.on { background: var(--pat-navy); color: #fff; }
  .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px); z-index: 300; background: var(--pat-navy); color: #fff; padding: 12px 20px; border-radius: var(--radius-pill); box-shadow: var(--shadow-lg); font-size: var(--fs-sm); font-weight: 600; opacity: 0; transition: opacity var(--dur-base) var(--ease-out), transform var(--dur-base) var(--ease-out); pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="StoreHeader.jsx"></script>
<script type="text/babel" src="StoreHome.jsx"></script>
<script type="text/babel" src="StoreFooter.jsx"></script>
<script type="text/babel">
  const { useState } = React;
  function App() {
    const [brandKey, setBrandKey] = useState('dental');
    const [cart, setCart] = useState(0);
    const [toast, setToast] = useState(false);
    const brand = window.STOREFRONT_BRANDS[brandKey];
    const add = () => {
      setCart((c) => c + 1);
      setToast(true);
      clearTimeout(window.__t); window.__t = setTimeout(() => setToast(false), 1600);
    };
    return (
      <React.Fragment>
        <window.StoreHeader brand={brand} cartCount={cart} onAddDemo={add} />
        <window.StoreHome brand={brand} onAdd={add} />
        <window.StoreFooter brand={brand} />
        <div className="brand-switch">
          <button className={brandKey === 'dental' ? 'on' : ''} onClick={() => { setBrandKey('dental'); setCart(0); window.scrollTo({ top: 0 }); }}>Dental</button>
          <button className={brandKey === 'vet' ? 'on' : ''} onClick={() => { setBrandKey('vet'); setCart(0); window.scrollTo({ top: 0 }); }}>Veterinary</button>
        </div>
        <div className={'toast' + (toast ? ' show' : '')}>Added to cart · {cart} item{cart === 1 ? '' : 's'}</div>
      </React.Fragment>
    );
  }
  const root = ReactDOM.createRoot(document.getElementById('root'));
  function start() {
    const ready = window.PattersonCompaniesDesignSystem_1f7cbe && window.STOREFRONT_BRANDS
      && window.StoreHeader && window.StoreHome && window.StoreFooter;
    if (!ready) return void setTimeout(start, 60);
    root.render(<App />);
  }
  start();
</script>
</body>
</html>
