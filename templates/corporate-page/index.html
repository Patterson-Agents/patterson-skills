<!-- @template name="Corporate Page" description="Patterson brand page shell — sticky nav, navy hero, content band and footer, built on the component library." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patterson — Corporate Page</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./ds-base.js"></script>
<style> html, body { margin: 0; background: var(--surface-page); } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function mount() {
    const DS = window.PattersonCompaniesDesignSystem_1f7cbe;
    if (!DS) { return void setTimeout(mount, 60); }
    const { Button, Card, Stat, Badge } = DS;

    const Arrow = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>;
    const nav = ['Our Company', 'What We Do', 'How We Do It', 'Newsroom'];

    function Page() {
      return (
        <React.Fragment>
          {/* Header */}
          <header style={{ position: 'sticky', top: 0, zIndex: 10, background: '#fff', boxShadow: 'var(--shadow-sm)' }}>
            <div className="pat-container" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 72 }}>
              <img src="../../assets/brand/patterson-logo-navy.svg" alt="Patterson" style={{ height:26, width:'auto', display:'block' }} />
              <nav style={{ display: 'flex', gap: 4 }}>
                {nav.map((n, i) => (
                  <a key={n} href="#" onClick={(e) => e.preventDefault()} style={{ fontSize: 'var(--fs-sm)', fontWeight: i === 0 ? 700 : 500, color: i === 0 ? 'var(--pat-navy)' : 'var(--text-body)', padding: '8px 12px', borderBottom: `2px solid ${i === 0 ? 'var(--pat-sky)' : 'transparent'}` }}>{n}</a>
                ))}
              </nav>
            </div>
          </header>

          {/* Hero */}
          <section style={{ background: 'var(--pat-navy)', color: '#fff', position: 'relative', overflow: 'hidden' }}>
            <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(120% 120% at 85% 10%, rgba(0,168,225,0.35), transparent 55%)' }} />
            <div className="pat-container" style={{ position: 'relative', paddingTop: 'var(--space-11)', paddingBottom: 'var(--space-11)', maxWidth: 820 }}>
              <div className="pat-eyebrow" style={{ color: 'var(--pat-sky)' }}>Trusted Expertise · Unrivaled Support</div>
              <h1 style={{ color: '#fff', fontSize: 'var(--fs-display)', margin: '14px 0 18px', maxWidth: '15ch', lineHeight: 1.04 }}>Your headline goes <span style={{ color: 'var(--pat-sky)' }}>here</span>.</h1>
              <p style={{ fontSize: 'var(--fs-lead)', color: 'rgba(255,255,255,0.82)', maxWidth: 600 }}>Replace this intro with your message. Built on the Patterson component library and tokens.</p>
              <div style={{ display: 'flex', gap: 14, marginTop: 28 }}>
                <Button variant="sky" size="lg" iconRight={<Arrow />}>Primary action</Button>
                <Button variant="onDark" size="lg">Secondary</Button>
              </div>
            </div>
          </section>

          {/* Content band */}
          <section className="pat-container" style={{ paddingTop: 'var(--space-9)', paddingBottom: 'var(--space-9)' }}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 'var(--space-5)' }}>
              <Card accent="sky"><Stat value="98%" label="Replace with your proof point" tone="sky" /></Card>
              <Card accent="navy" interactive>
                <Badge tone="sky" solid>New</Badge>
                <h3 style={{ margin: '12px 0 6px' }}>Card heading</h3>
                <p style={{ margin: 0, fontSize: 'var(--fs-sm)' }}>Compose content from the Patterson component library.</p>
              </Card>
              <Card accent="teal"><Stat value="1877" label="Replace with your proof point" tone="teal" /></Card>
            </div>
          </section>

          {/* Footer */}
          <footer style={{ background: 'var(--pat-navy)', color: 'rgba(255,255,255,0.75)' }}>
            <div className="pat-container" style={{ paddingTop: 'var(--space-7)', paddingBottom: 'var(--space-7)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
              <img src="../../assets/brand/patterson-logo-white.svg" alt="Patterson" style={{ height:22, width:'auto', display:'block' }} />
              <span style={{ fontSize: 'var(--fs-xs)' }}>© 2026 Patterson Companies, Inc. All rights reserved.</span>
            </div>
          </footer>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
  }
  document.addEventListener('DOMContentLoaded', mount);
  mount();
</script>
</body>
</html>
